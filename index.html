<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrusDuit - Premium Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .status-hijau { background: linear-gradient(135deg, #10B981, #059669); }
    .status-kuning { background: linear-gradient(135deg, #FBBF24, #D97706); }
    .status-merah { background: linear-gradient(135deg, #EF4444, #DC2626); }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl flex flex-col justify-between">
    <header class="p-6 bg-slate-900 text-white rounded-b-3xl shadow-lg">
      <div class="flex justify-between items-center mb-4">
        <div>
          <p class="text-xs text-slate-400 font-medium">Selamat Datang</p>
          <h1 class="text-xl font-bold tracking-tight">Dompet Digital Anda</h1>
        </div>
        <div class="flex items-center space-x-2">
          <button onclick="muatTurunPDF()" class="text-xs bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 px-3 py-1.5 rounded-full transition font-semibold">
            <i class="fa-solid fa-file-pdf mr-1"></i> Laporan
          </button>
          <button onclick="tetapkanReset()" class="text-xs bg-red-600/20 hover:bg-red-600/40 text-red-400 px-3 py-1.5 rounded-full transition font-semibold">
            <i class="fa-solid fa-rotate-right mr-1"></i> Reset
          </button>
        </div>
      </div>
      
      <div id="kadStatus" class="status-hijau p-5 rounded-2xl text-white transition-all duration-500 shadow-md">
        <p class="text-xs opacity-85 font-medium">Baki Bulanan Keseluruhan (Termasuk Bawa Hadapan)</p>
        <h2 id="txtBakiBulanan" class="text-3xl font-black my-1">RM 0.00</h2>
        <div class="flex justify-between text-xs mt-3 opacity-90 border-t border-white/20 pt-2">
          <span>Hari Ini: <strong id="txtHariIni">RM 0.00</strong></span>
          <span>Bulan Ini: <strong id="txtBulanIni">RM 0.00</strong></span>
        </div>
      </div>
    </header>

    <main class="p-6 flex-grow space-y-6 overflow-y-auto">
      
      <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm space-y-3">
        <h3 class="text-sm font-bold text-slate-700"><i class="fa-solid fa-plus-circle text-emerald-500 mr-1"></i> Rekod Belanja Baharu</h3>
        <div class="grid grid-cols-2 gap-2">
          <input type="text" id="inpNama" placeholder="Nama (cth: Sarapan)" class="col-span-2 p-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900">
          <input type="number" id="inpJumlah" placeholder="Jumlah RM" class="p-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900">
          <select id="selKategori" class="p-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-900">
            </select>
        </div>
        <button onclick="tambahBelanja()" class="w-full bg-slate-900 text-white py-2.5 rounded-xl font-bold hover:bg-slate-800 transition text-sm">
          Masukkan Perbelanjaan
        </button>
      </div>

      <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
        <div class="flex justify-between items-center mb-2">
          <h3 class="text-sm font-bold text-slate-700"><i class="fa-solid fa-tags text-blue-500 mr-1"></i> Had Kategori</h3>
          <button onclick="bukaUrusKategori()" class="text-xs text-blue-600 font-semibold">+ Cipta Kategori</button>
        </div>
        <div id="senaraiKategoriStatus" class="space-y-3 mt-3">
          </div>
      </div>

      <div class="space-y-3">
        <h3 class="text-sm font-bold text-slate-700"><i class="fa-solid fa-history text-slate-500 mr-1"></i> Aliran Tunai Bulan Ini</h3>
        <div id="senaraiTransaksi" class="space-y-2">
          </div>
      </div>
    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz81lfqBJWG7Yh0S5kLcPIEDCrDOthsdCsIHDdX59eawskcq1qpiS6TWzXnd0LBC5g/exec"; 

    let dataSistem = {};

    async function muatData() {
      try {
        Swal.fire({ title: 'Memuatkan data...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        const respon = await fetch(API_URL);
        const textRespon = await respon.text();
        try {
          dataSistem = JSON.parse(textRespon);
        } catch (e) {
          throw new Error("Google Apps Script memulangkan ralat. Pastikan nama Tab Helaian betul atau semak tetapan kebenaran (Access).");
        }
        Swal.close();
        kemaskiniUI();
      } catch (error) {
        Swal.fire('Ralat Sistem', error.message, 'error');
        console.error("Butiran Ralat:", error);
      }
    }

    function kemaskiniUI() {
      document.getElementById('txtHariIni').innerText = `RM ${dataSistem.jumlahHariIni.toFixed(2)}`;
      document.getElementById('txtBulanIni').innerText = `RM ${dataSistem.jumlahBulanIni.toFixed(2)}`;
      document.getElementById('txtBakiBulanan').innerText = `RM ${dataSistem.bakiBulanan.toFixed(2)}`;

      const kad = document.getElementById('kadStatus');
      kad.className = "p-5 rounded-2xl text-white transition-all duration-500 shadow-md";
      if (dataSistem.bakiBulanan < 0) {
        kad.classList.add('status-merah');
      } else if (dataSistem.bakiBulanan < 150) { 
        kad.classList.add('status-kuning');
      } else {
        kad.classList.add('status-hijau');
      }

      const select = document.getElementById('selKategori');
      select.innerHTML = '';
      const katContainer = document.getElementById('senaraiKategoriStatus');
      katContainer.innerHTML = '';

      Object.keys(dataSistem.kategori).forEach(key => {
        const kat = dataSistem.kategori[key];
        const bakiKategori = kat.hadBulanan - kat.gunaBulanan;
        let teksBakiDropdown = '';
        let teksBakiKad = '';
        
        if (kat.hadBulanan > 0) {
          if (bakiKategori >= 0) {
            teksBakiDropdown = ` (Baki: RM ${bakiKategori.toFixed(2)})`;
            teksBakiKad = `<span class="text-emerald-500 ml-1 font-bold">Baki: RM ${bakiKategori.toFixed(2)}</span>`;
          } else {
            teksBakiDropdown = ` (TERLEBIH: -RM ${Math.abs(bakiKategori).toFixed(2)})`;
            teksBakiKad = `<span class="text-red-500 ml-1 font-bold">Terlebih: -RM ${Math.abs(bakiKategori).toFixed(2)}</span>`;
          }
        } else {
           teksBakiDropdown = ` (Tiada Had)`;
           teksBakiKad = `<span class="text-slate-400 ml-1">(Tiada Had)</span>`;
        }

        select.innerHTML += `<option value="${key}">${key}${teksBakiDropdown}</option>`;
        
        const peratusGuna = kat.hadBulanan > 0 ? (kat.gunaBulanan / kat.hadBulanan) * 100 : 0;
        let warnaBar = 'bg-emerald-500';
        if (peratusGuna >= 100) warnaBar = 'bg-red-500';
        else if (peratusGuna > 75) warnaBar = 'bg-amber-500';

        katContainer.innerHTML += `
          <div class="text-xs border-b border-slate-100 pb-2">
            <div class="flex justify-between font-medium text-slate-600 mb-1">
              <span>${key} ${teksBakiKad} <span class="text-slate-400 font-normal"> / Had: RM${kat.hadBulanan}</span></span>
              <span class="font-bold text-slate-700">Guna: RM ${kat.gunaBulanan.toFixed(2)}</span>
            </div>
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
              <div class="${warnaBar} h-full" style="width: ${Math.min(peratusGuna, 100)}%"></div>
            </div>
            <div class="flex justify-between items-center mt-1">
              <span class="text-[10px] text-slate-400">Hari ini: RM ${kat.gunaHarian.toFixed(2)} / Had: RM ${kat.hadHarian}</span>
              <div class="space-x-3">
                <button onclick="editKategori('${key}', ${kat.hadHarian}, ${kat.hadBulanan})" class="text-[10px] text-blue-500 hover:underline font-medium"><i class="fa-regular fa-pen-to-square"></i> Edit</button>
                <button onclick="padamKategori('${key}')" class="text-[10px] text-red-500 hover:underline font-medium"><i class="fa-regular fa-trash-can"></i> Padam</button>
              </div>
            </div>
          </div>
        `;
      });

      const transContainer = document.getElementById('senaraiTransaksi');
      transContainer.innerHTML = '';
      dataSistem.transaksi.forEach(t => {
        transContainer.innerHTML += `
          <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100 text-xs">
            <div>
              <p class="font-bold text-slate-800">${t.nama}</p>
              <p class="text-[10px] text-slate-400">${t.kategori} • ${new Date(t.tarikh).toLocaleDateString('ms-MY')}</p>
            </div>
            <div class="flex items-center space-x-3">
              <span class="font-bold text-slate-900">RM ${t.jumlah.toFixed(2)}</span>
              <button onclick="padamTransaksi('${t.id}')" class="text-slate-400 hover:text-red-500 transition">
                <i class="fa-solid fa-circle-xmark text-sm"></i>
              </button>
            </div>
          </div>
        `;
      });
    }

    async function tambahBelanja() {
      const nama = document.getElementById('inpNama').value;
      const jumlah = parseFloat(document.getElementById('inpJumlah').value);
      const kategori = document.getElementById('selKategori').value;

      if (!nama || !jumlah || !kategori) {
        Swal.fire('Ralat', 'Sila lengkapkan semua ruangan!', 'error');
        return;
      }

      const katDipilih = dataSistem.kategori[kategori];
      if (katDipilih) {
        const ramalanHarian = katDipilih.gunaHarian + jumlah;
        const ramalanBulanan = katDipilih.gunaBulanan + jumlah;
        
        if (ramalanHarian > katDipilih.hadHarian || ramalanBulanan > katDipilih.hadBulanan) {
          const sah = await Swal.fire({
            title: 'Amaran Had Melebihi!',
            text: `Kategori ${kategori} akan melebihi had yang ditetapkan jika transaksi diteruskan. Anda pasti?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ya, Teruskan',
            cancelButtonText: 'Batal'
          });
          if (!sah.isConfirmed) return;
        }
      }

      await hantarData({ tindakan: "tambahBelanja", nama, jumlah, kategori });
      document.getElementById('inpNama').value = '';
      document.getElementById('inpJumlah').value = '';
      muatData();
    }

    async function padamTransaksi(id) {
      const sah = await Swal.fire({ title: 'Padam rekod?', text: "Tindakan ini tidak boleh diundur.", icon: 'warning', showCancelButton: true });
      if (sah.isConfirmed) {
        await hantarData({ tindakan: "padamBelanja", id });
        muatData();
      }
    }

    async function bukaUrusKategori() {
      const { value: formValues } = await Swal.fire({
        title: 'Cipta Kategori Baru',
        html:
          '<input id="swal-input1" class="swal2-input placeholder-sm text-sm" placeholder="Nama Kategori (cth: Makanan)">' +
          '<input type="number" id="swal-input2" class="swal2-input text-sm" placeholder="Had Harian (RM)">' +
          '<input type="number" id="swal-input3" class="swal2-input text-sm" placeholder="Had Bulanan (RM)">',
        focusConfirm: false,
        preConfirm: () => {
          return [
            document.getElementById('swal-input1').value,
            document.getElementById('swal-input2').value,
            document.getElementById('swal-input3').value
          ]
        }
      });

      if (formValues && formValues[0]) {
        await hantarData({ tindakan: "tambahKategori", nama: formValues[0], hadHarian: parseFloat(formValues[1]||0), hadBulanan: parseFloat(formValues[2]||0) });
        muatData();
      }
    }

    async function editKategori(namaAsal, hadHarianAsal, hadBulananAsal) {
      const { value: formValues } = await Swal.fire({
        title: 'Kemaskini Kategori',
        html:
          `<div class="text-left text-xs mb-1 text-slate-500 font-bold">Nama Kategori</div>` +
          `<input id="swal-edit1" class="swal2-input placeholder-sm text-sm mt-0 mb-3" value="${namaAsal}" placeholder="Nama Kategori">` +
          `<div class="text-left text-xs mb-1 text-slate-500 font-bold">Had Harian (RM)</div>` +
          `<input type="number" id="swal-edit2" class="swal2-input text-sm mt-0 mb-3" value="${hadHarianAsal}" placeholder="Had Harian (RM)">` +
          `<div class="text-left text-xs mb-1 text-slate-500 font-bold">Had Bulanan (RM)</div>` +
          `<input type="number" id="swal-edit3" class="swal2-input text-sm mt-0" value="${hadBulananAsal}" placeholder="Had Bulanan (RM)">`,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: 'Simpan Perubahan',
        cancelButtonText: 'Batal',
        preConfirm: () => {
          return [
            document.getElementById('swal-edit1').value,
            document.getElementById('swal-edit2').value,
            document.getElementById('swal-edit3').value
          ]
        }
      });

      if (formValues && formValues[0]) {
        await hantarData({ 
          tindakan: "kemaskiniKategori", 
          namaAsal: namaAsal, 
          namaBaru: formValues[0], 
          hadHarian: parseFloat(formValues[1]||0), 
          hadBulanan: parseFloat(formValues[2]||0) 
        });
        muatData();
      }
    }
    
    async function padamKategori(nama) {
      const sah = await Swal.fire({ title: `Padam kategori ${nama}?`, text: "Had perbelanjaan kategori ini akan dikeluarkan.", icon: 'warning', showCancelButton: true });
      if (sah.isConfirmed) {
        await hantarData({ tindakan: "padamKategori", nama });
        muatData();
      }
    }

    async function tetapkanReset() {
      const sah = await Swal.fire({
        title: 'Adakah anda pasti?',
        text: "Sistem akan membersihkan transaksi bulan ini. Baki semasa akan secara automatik dibawa ke hadapan bagi bulan baru!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: 'Ya, Reset Bulan Baru'
      });

      if (sah.isConfirmed) {
        Swal.fire({ title: 'Memproses penutupan akaun...', didOpen: () => Swal.showLoading() });
        const respon = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ tindakan: "resetSistem" })
        });
        const hasil = await respon.json();
        Swal.fire('Selesai!', `Sistem berjaya direset. Baki dibawa ke hadapan: RM ${hasil.bakiBaru.toFixed(2)}`, 'success');
        muatData();
      }
    }

    async function hantarData(data) {
      Swal.fire({ title: 'Menghantar...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
      await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
    }

    // --- FUNGSI PAKAR: REKA BENTUK & CETAKAN LAPORAN PDF ---
    function muatTurunPDF() {
      if (!dataSistem.kategori || Object.keys(dataSistem.kategori).length === 0) {
        Swal.fire('Ralat', 'Tiada data untuk dijana sebagai laporan.', 'warning');
        return;
      }

      const tarikhSemasa = new Date();
      const bulanTahun = tarikhSemasa.toLocaleDateString('ms-MY', { month: 'long', year: 'numeric' });
      
      // Membina layout penyata akaun korporat premium (A4)
      const elemenLaporan = document.createElement('div');
      elemenLaporan.style.padding = '20mm 15mm';
      elemenLaporan.style.backgroundColor = '#ffffff';
      elemenLaporan.style.fontFamily = 'Arial, sans-serif';
      elemenLaporan.style.color = '#1e293b';
      
      let htmlKandungan = `
        <div style="border-bottom: 3px solid #0f172a; padding-bottom: 16px; margin-bottom: 25px;">
          <table style="width: 100%; border-collapse: collapse;">
            <tr>
              <td>
                <h1 style="font-size: 24px; font-weight: 900; color: #0f172a; margin: 0; letter-spacing: -0.5px;">URUSDUIT</h1>
                <p style="font-size: 11px; color: #64748b; margin: 4px 0 0 0; font-weight: bold; text-transform: uppercase;">Sistem Penjejak Kewangan Peribadi</p>
              </td>
              <td style="text-align: right; vertical-align: bottom;">
                <h2 style="font-size: 14px; font-weight: bold; color: #0f172a; margin: 0;">PENYATA BULANAN</h2>
                <p style="font-size: 12px; color: #475569; margin: 2px 0 0 0; font-weight: bold;">Sesi: ${bulanTahun}</p>
              </td>
            </tr>
          </table>
        </div>
        
        <p style="font-size: 10px; color: #94a3b8; margin-bottom: 20px;">Tarikh Cetakan: ${new Date().toLocaleString('ms-MY')}</p>

        <h3 style="font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px;">1. Ringkasan Aliran Tunai</h3>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 12px;">
          <tr>
            <td style="width: 33%; padding: 15px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px 0 0 6px;">
              <span style="font-size: 9px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px;">BAKI BAWA KE HADAPAN</span>
              <strong style="font-size: 16px; color: #0f172a;">RM ${parseFloat(dataSistem.bakiBawaHadapan || 0).toFixed(2)}</strong>
            </td>
            <td style="width: 33%; padding: 15px; background-color: #f8fafc; border-y: 1px solid #e2e8f0; border-r: 1px solid #e2e8f0;">
              <span style="font-size: 9px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px;">TOTAL BELANJA BULAN INI</span>
              <strong style="font-size: 16px; color: #334155;">RM ${dataSistem.jumlahBulanIni.toFixed(2)}</strong>
            </td>
            <td style="width: 33%; padding: 15px; background-color: #f8fafc; border-y: 1px solid #e2e8f0; border-r: 1px solid #e2e8f0; border-radius: 0 6px 6px 0;">
              <span style="font-size: 9px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px;">BAKI BERSIH SEMASA</span>
              <strong style="font-size: 16px; color: ${dataSistem.bakiBulanan >= 0 ? '#059669' : '#dc2626'};">RM ${dataSistem.bakiBulanan.toFixed(2)}</strong>
            </td>
          </tr>
        </table>

        <h3 style="font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px;">2. Analisis Belanja Mengikut Kategori</h3>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 11px; border: 1px solid #e2e8f0;">
          <thead>
            <tr style="background-color: #0f172a; color: #ffffff; text-align: left;">
              <th style="padding: 10px; font-weight: bold;">Kategori</th>
              <th style="padding: 10px; font-weight: bold; text-align: right;">Had Peruntukan</th>
              <th style="padding: 10px; font-weight: bold; text-align: right;">Jumlah Digunakan</th>
              <th style="padding: 10px; font-weight: bold; text-align: right;">Baki Sedia Ada</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      Object.keys(dataSistem.kategori).forEach(key => {
        const kat = dataSistem.kategori[key];
        const baki = kat.hadBulanan - kat.gunaBulanan;
        htmlKandungan += `
          <tr style="border-bottom: 1px solid #e2e8f0;">
            <td style="padding: 10px; font-weight: bold; color: #1e293b;">${key}</td>
            <td style="padding: 10px; text-align: right; color: #475569;">RM ${kat.hadBulanan.toFixed(2)}</td>
            <td style="padding: 10px; text-align: right; color: #1e293b;">RM ${kat.gunaBulanan.toFixed(2)}</td>
            <td style="padding: 10px; text-align: right; font-weight: bold; color: ${baki >= 0 ? '#059669' : '#dc2626'}">
              ${baki >= 0 ? 'RM ' + baki.toFixed(2) : '-RM ' + Math.abs(baki).toFixed(2)}
            </td>
          </tr>
        `;
      });
      
      htmlKandungan += `
          </tbody>
        </table>

        <h3 style="font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px;">3. Log Transaksi Terperinci</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 10px; border: 1px solid #e2e8f0;">
          <thead>
            <tr style="background-color: #f1f5f9; color: #0f172a; text-align: left; border-bottom: 2px solid #cbd5e1;">
              <th style="padding: 8px; font-weight: bold;">Tarikh</th>
              <th style="padding: 8px; font-weight: bold;">Perkara / Item</th>
              <th style="padding: 8px; font-weight: bold;">Kategori</th>
              <th style="padding: 8px; font-weight: bold; text-align: right;">Amaun (RM)</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      if (dataSistem.transaksi.length === 0) {
        htmlKandungan += `<tr><td colspan="4" style="padding: 15px; text-align: center; color: #94a3b8; font-style: italic;">Tiada rekod transaksi dijumpai untuk sesi ini.</td></tr>`;
      } else {
        dataSistem.transaksi.forEach(t => {
          htmlKandungan += `
            <tr style="border-bottom: 1px solid #f1f5f9;">
              <td style="padding: 8px; color: #64748b;">${new Date(t.tarikh).toLocaleDateString('ms-MY')}</td>
              <td style="padding: 8px; font-weight: bold; color: #0f172a;">${t.nama}</td>
              <td style="padding: 8px; color: #475569;">${t.kategori}</td>
              <td style="padding: 8px; text-align: right; font-weight: bold; color: #0f172a;">RM ${t.jumlah.toFixed(2)}</td>
            </tr>
          `;
        });
      }
      
      htmlKandungan += `
          </tbody>
        </table>

        <div style="margin-top: 50px; text-align: center; font-size: 9px; color: #94a3b8; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
          * Penyata ini disah milik dan dijana secara digital dari fail storan awan Google Drive anda. Selesai *
        </div>
      `;
      
      elemenLaporan.innerHTML = htmlKandungan;
      
      // Konfigurasi Kualiti Cetakan PDF Pakar
      const pilihanSistem = {
        margin:       10,
        filename:     `Laporan_Kewangan_UrusDuit_${tarikhSemasa.getMonth()+1}_${tarikhSemasa.getFullYear()}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      
      Swal.fire({ title: 'Menjana dokumen PDF...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
      
      // Melaksanakan proses eksport muat turun fail PDF
      html2pdf().from(elemenLaporan).set(pilihanSistem).save().then(() => {
        Swal.fire('Berjaya!', 'Penyata kewangan bulanan PDF anda telah sedia dan dimuat turun.', 'success');
      }).catch(ralat => {
        Swal.fire('Ralat Muat Turun', 'Gagal membina fail PDF: ' + ralat.message, 'error');
      });
    }

    window.onload = muatData;
  </script>
</body>
</html>
